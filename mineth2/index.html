<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CHSMS Register</title>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

	<style>
		body {
			font-family: "Century Gothic", Arial, sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #3d2314;
			margin: 0;
			position: relative;
			overflow: hidden;
		}

		.bg-emoji {
			position: absolute;
			font-size: 75px;
			opacity: 0.07;
			user-select: none;
			pointer-events: none;
			z-index: 1;
		}

		.emoji-1 { top: 8%; left: 8%; transform: rotate(-15deg); }
		.emoji-2 { top: 12%; right: 10%; transform: rotate(20deg); }
		.emoji-3 { bottom: 10%; left: 12%; transform: rotate(10deg); }
		.emoji-4 { bottom: 8%; right: 8%; transform: rotate(-25deg); }
		.emoji-5 { top: 45%; left: 5%; transform: rotate(45deg); font-size: 65px; }
		.emoji-6 { top: 48%; right: 5%; transform: rotate(-30deg); font-size: 65px; }
		.emoji-7 { top: 6%; left: 48%; transform: rotate(15deg); font-size: 70px; }
		.emoji-8 { bottom: 6%; left: 50%; transform: rotate(-10deg); font-size: 70px; }

		.card {
			background: SaddleBrown;
			padding: 40px 30px;
			border-radius: 15px;
			box-shadow: 0 4px 20px rgba(0,0,0,0.3);
			text-align: center;
			max-width: 400px;
			width: 85%;
			position: relative;
			z-index: 2;
		}

		h2, p {
			color: white;
		}

		input {
			width: 90%;
			padding: 12px;
			border: none;
			border-bottom: 2px solid white;
			background: transparent;
			color: white;
			outline: none;
		}

		button {
			background-color: #8BC34A;
			color: black;
			border: none;
			padding: 14px 40px;
			border-radius: 10px;
			cursor: pointer;
			font-weight: bold;
			margin-top: 30px;
		}
	</style>
</head>

<body>

	<div class="bg-emoji emoji-1">🏛️</div>
	<div class="bg-emoji emoji-2">📜</div>
	<div class="bg-emoji emoji-3">🗺️</div>
	<div class="bg-emoji emoji-4">🧭</div>
	<div class="bg-emoji emoji-5">🗿</div>
	<div class="bg-emoji emoji-6">🏰</div>
	<div class="bg-emoji emoji-7">🎨</div>
	<div class="bg-emoji emoji-8">🧱</div>

	<div class="card">
		<h2>Welcome to CHSMS</h2>
		<p>Please enter your email below.</p>

		<form id="emailForm">
			<input type="hidden" id="qrSource" value="2" />
			
			<input type="email" id="customerEmail" placeholder="Enter email" required />
			<br />
			<button type="submit">Submit</button>
		</form>

		<div id="message"></div>
	</div>

	<script>
		const SUPABASE_URL = "https://hwhqwjivazdozojhkeli.supabase.co";
		const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3aHF3aml2YXpkb3pvamhrZWxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NTgwNjcsImV4cCI6MjA5NzMzNDA2N30.5qgsM9KZ2Ff7EiYWab9yCXfhmibRZOwh4UXM0UiU92Q";

		// Renamed to 'supabaseClient' to completely avoid the duplicate error
		const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

		document.getElementById('emailForm').addEventListener('submit', async (e) => {
			e.preventDefault(); // This will now successfully stop the page redirect!
			
			const emailInput = document.getElementById('customerEmail');
			const messageDiv = document.getElementById('message');
			const submitButton = e.target.querySelector('button');
			
			const email = emailInput.value;
			const source = document.getElementById('qrSource').value;

			messageDiv.style.marginTop = '15px';
			messageDiv.style.color = 'white';
			messageDiv.innerText = 'Sending...';
			submitButton.disabled = true; 

			try {
				// Using the renamed 'supabaseClient' here
				const { error: dbError } = await supabaseClient
					.from('visitors_emails')
					.insert([
						{ 
							email: email, 
							site: parseInt(source)
						}
					]);

				if (dbError) {
					console.error("Database Error:", dbError);
					throw new Error("Failed to save to database. Check your table permissions.");
				}

				const response = await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
					},
					body: JSON.stringify({ email: email, source: source })
				});

				const result = await response.json();
				
				if (response.ok) {
					messageDiv.style.color = '#8BC34A'; 
					messageDiv.innerText = 'Email sent successfully!';
					emailInput.value = ''; 
				} else {
					messageDiv.style.color = '#ff6b6b'; 
					messageDiv.innerText = 'Error: ' + (result.error || 'Failed to send.');
				}
			} catch (err) {
				console.error(err);
				messageDiv.style.color = '#ff6b6b';
				messageDiv.innerText = err.message || 'An error occurred connecting to the server.';
			} finally {
				submitButton.disabled = false;
			}
		});
	</script>
</body>
</html>
