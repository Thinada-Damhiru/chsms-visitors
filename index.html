<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CHSMS Register</title>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

	<style>
		body {
			font-family: "Century Gothic", Arial, sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #3d2314;
			margin: 0;
			position: relative;
			overflow: hidden;
		}

		.bg-emoji {
			position: absolute;
			font-size: 75px;
			opacity: 0.07;
			user-select: none;
			pointer-events: none;
			z-index: 1;
		}

		.emoji-1 { top: 8%; left: 8%; transform: rotate(-15deg); }
		.emoji-2 { top: 12%; right: 10%; transform: rotate(20deg); }
		.emoji-3 { bottom: 10%; left: 12%; transform: rotate(10deg); }
		.emoji-4 { bottom: 8%; right: 8%; transform: rotate(-25deg); }
		.emoji-5 { top: 45%; left: 5%; transform: rotate(45deg); font-size: 65px; }
		.emoji-6 { top: 48%; right: 5%; transform: rotate(-30deg); font-size: 65px; }
		.emoji-7 { top: 6%; left: 48%; transform: rotate(15deg); font-size: 70px; }
		.emoji-8 { bottom: 6%; left: 50%; transform: rotate(-10deg); font-size: 70px; }

		.card {
			background: SaddleBrown;
			padding: 40px 30px;
			border-radius: 15px;
			box-shadow: 0 4px 20px rgba(0,0,0,0.3);
			text-align: center;
			max-width: 400px;
			width: 85%;
			position: relative;
			z-index: 2;
		}

		h2, p {
			color: white;
		}

		input {
			width: 90%;
			padding: 12px;
			border: none;
			border-bottom: 2px solid white;
			background: transparent;
			color: white;
			outline: none;
		}

		button {
			background-color: #8BC34A;
			color: black;
			border: none;
			padding: 14px 40px;
			border-radius: 10px;
			cursor: pointer;
			font-weight: bold;
			margin-top: 30px;
		}
	</style>
</head>

<body>

	<div class="bg-emoji emoji-1">🏛️</div>
	<div class="bg-emoji emoji-2">📜</div>
	<div class="bg-emoji emoji-3">🗺️</div>
	<div class="bg-emoji emoji-4">🧭</div>
	<div class="bg-emoji emoji-5">🗿</div>
	<div class="bg-emoji emoji-6">🏰</div>
	<div class="bg-emoji emoji-7">🎨</div>
	<div class="bg-emoji emoji-8">🧱</div>

	<div class="card">
		<h2>Welcome to CHSMS</h2>
		<p>Please enter your email below.</p>

		<form id="emailForm">
			<input type="email" id="customerEmail" placeholder="Enter email" required />
			<br />
			<button type="submit">Submit</button>
		</form>

		<div id="message"></div>
	</div>

<script>
const SUPABASE_URL = "https://hwhqwjivazdozojhkeli.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY_HERE";
const EDGE_FUNCTION_NAME = "send-email";

document.getElementById('emailForm').addEventListener('submit', async (e) => {
	e.preventDefault();

	const emailInput = document.getElementById('customerEmail').value;
	const messageDiv = document.getElementById('message');

	messageDiv.innerText = "Processing...";

	try {
		const response = await fetch(
			`${SUPABASE_URL}/functions/v1/${EDGE_FUNCTION_NAME}`,
			{
				method: "POST",
				headers: {
					"Content-Type": "application/json",
					"apikey": SUPABASE_ANON_KEY,
					"Authorization": `Bearer ${SUPABASE_ANON_KEY}`
				},
				body: JSON.stringify({ visitorEmail: emailInput })
			}
		);

		const text = await response.text();
		const result = text ? JSON.parse(text) : {};

		if (!response.ok) throw new Error(result.error || "Failed request");

		messageDiv.style.color = "lightgreen";
		messageDiv.innerText = "Email sent successfully!";
		document.getElementById('emailForm').reset();

	} catch (err) {
		console.error(err);
		messageDiv.style.color = "orange";
		messageDiv.innerText = "Email failed. Check console.";
	}
});
</script>

</body>
</html>
