<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CHSMS Register</title>
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<style>
			body {
			font-family: "Century Gothic", Arial, sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #3d2314; /* Deep rustic undertone matching SaddleBrown */
			margin: 0;
			position: relative;
			overflow: hidden; /* Prevents emojis from causing scrollbars */
			}

			/* 🎨 FADED BACKGROUND EMOJI ARTWORK */
			.bg-emoji {
			position: absolute;
			font-size: 75px; /* Adjust size of the emojis here */
			opacity: 0.07;   /* Controls the fade (0.07 = 7% visible). Adjust as preferred */
			user-select: none;
			pointer-events: none; /* Prevents users from clicking or selecting them */
			z-index: 1;      /* Places them behind the form card */
			}

			/* Position variations across the screen canvas */
			.emoji-1 { top: 8%; left: 8%; transform: rotate(-15deg); }
			.emoji-2 { top: 12%; right: 10%; transform: rotate(20deg); }
			.emoji-3 { bottom: 10%; left: 12%; transform: rotate(10deg); }
			.emoji-4 { bottom: 8%; right: 8%; transform: rotate(-25deg); }
			.emoji-5 { top: 45%; left: 5%; transform: rotate(45deg); font-size: 65px; }
			.emoji-6 { top: 48%; right: 5%; transform: rotate(-30deg); font-size: 65px; }
			.emoji-7 { top: 6%; left: 48%; transform: rotate(15deg); font-size: 70px; }
			.emoji-8 { bottom: 6%; left: 50%; transform: rotate(-10deg); font-size: 70px; }

			.card {
			background: SaddleBrown; /* Matches your WPF Main Card perfectly */
			padding: 40px 30px;
			border-radius: 15px; /* Matches your WPF UniformCornerRadius="15" */
			box-shadow: 0 4px 20px rgba(0,0,0,0.3);
			text-align: center;
			max-width: 400px;
			width: 85%;
			position: relative;
			z-index: 2; /* Forces the login card to sit ON TOP of the emojis */
			}
			h2 {
			color: white;
			font-size: 25px;
			font-weight: bold;
			margin: 0 0 5px 0;
			}
			p {
			color: white;
			font-size: 13px;
			font-weight: normal;
			margin: 0 0 35px 0;
			opacity: 0.9;
			}
			input[type="email"] {
			width: 90%;
			padding: 12px 10px;
			margin: 15px 0;
			border: none;
			border-bottom: 2px solid white; /* Emulates the MaterialDesign floating textbox style */
			background: transparent;
			color: white;
			font-size: 14px;
			outline: none;
			}
			input[type="email"]::placeholder {
			color: rgba(255, 255, 255, 0.7);
			}
			button {
			background-color: #8BC34A; /* Integrated your target theme color here */
			color: black;
			border: none;
			padding: 14px 40px;
			border-radius: 10px; /* Matches your WPF Button CornerRadius="10" */
			cursor: pointer;
			font-size: 12px;
			font-weight: bold;
			margin-top: 30px;
			text-transform: uppercase;
			letter-spacing: 1px;
			transition: background 0.2s ease;
			}
			button:hover {
			background-color: #7CB342; /* Slightly darker shade for interactive feedback */
			}
			#message {
			margin-top: 20px;
			font-weight: bold;
			font-size: 14px;
			}
		</style>
	</head>
	<body>

		<div class="bg-emoji emoji-1">🏛️</div>
		<div class="bg-emoji emoji-2">📜</div>
		<div class="bg-emoji emoji-3">🗺️</div>
		<div class="bg-emoji emoji-4">🧭</div>
		<div class="bg-emoji emoji-5">🗿</div>
		<div class="bg-emoji emoji-6">🏰</div>
		<div class="bg-emoji emoji-7">🎨</div>
		<div class="bg-emoji emoji-8">🧱</div>

		<div class="card">
			<h2>Welcome to CHSMS</h2>
			<p>Please enter your email below.</p>

			<form id="emailForm">
				<input type="email" id="customerEmail" placeholder="Enter your email address" required="required" />
				<br />
				<button type="submit">Submit</button>
			</form>

			<div id="message"></div>
		</div>

		<script>
			// 1. YOUR SUPABASE CREDENTIALS
			const SUPABASE_URL = "https://hwhqwjivazdozojhkeli.supabase.co";
			const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3aHF3aml2YXpkb3pvamhrZWxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NTgwNjcsImV4cCI6MjA5NzMzNDA2N30.5qgsM9KZ2Ff7EiYWab9yCXfhmibRZOwh4UXM0UiU92Q";

			// Initialize Supabase client
			const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

			// 2. Handle Form Submission
			document.getElementById('emailForm').addEventListener('submit', async (e) => {
			e.preventDefault();
			const emailInput = document.getElementById('customerEmail').value;
			const messageDiv = document.getElementById('message');

			// Insert data into Supabase
			const { data, error } = await supabaseClient
			.from('visitors_emails')
			.insert([{ email: emailInput }]);

			if (error) {
			console.error(error);
			messageDiv.style.color = "#ff8080";
			messageDiv.innerText = "Something went wrong. Please try again.";
			} else {
			messageDiv.style.color = "#80ff80";
			messageDiv.innerText = "You will receive more details through an email.";
			document.getElementById('emailForm').reset();
			}
			});
		</script>
	</body>
</html>
