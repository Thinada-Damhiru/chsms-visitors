<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CHSMS Register</title>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

	<style>
		/* 1. This strictly blocks the extra white space on mobile */
		/* 1. This strictly blocks the extra white space on mobile (Both X and Y axis) */
html, body {
    max-width: 100%;
    overflow-x: hidden;
    overflow-y: hidden; /* <-- THIS KILLS THE VERTICAL SCROLLING */
    margin: 0;
    padding: 0;
    height: 100%; /* A fallback floor for older phones */
}

/* 2. This perfectly centers your card on desktop and mobile */
body {
    font-family: "Century Gothic", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh; /* <-- CHANGED FROM 100vh TO 100dvh */
    background-color: #000000;
    position: relative;
    overflow: hidden; 
}
		/* --- NEW: Mosaic / Bento Box Background Grid --- */
		.background-grid {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100vh;
			display: grid;
			/* This creates a fluid grid of columns */
			grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
			grid-auto-rows: 200px; /* Base height for all grid blocks */
			grid-auto-flow: dense; /* The packing algorithm */
			gap: 15px; 
			padding: 15px;
			box-sizing: border-box;
			z-index: 1;
			opacity: 0.6; /* Keep it low so the form is readable */
		}

		/* Base style for every image in the grid */
		.grid-image {
			width: 100%;
			height: 100%;
			object-fit: cover; 
			border-radius: 12px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.1);
			user-select: none;
			pointer-events: none;
		}

		/* The Sizing Blocks - Change these in your HTML to alter the pattern */
		.size-large {
			grid-column: span 2; 
			grid-row: span 2;    
		}

		.size-wide {
			grid-column: span 2;
			grid-row: span 1;
		}

		.size-tall {
			grid-column: span 1;
			grid-row: span 2;
		}

		.size-small {
			grid-column: span 1;
			grid-row: span 1;
		}

		/* --- Form Card Styles --- */
		.card {
			background: #284A9D;
			padding: 40px 30px;
			border-radius: 15px;
			box-shadow: 0 4px 20px rgba(0,0,0,0.3);
			text-align: center;
			max-width: 400px;
			width: 85%;
			position: relative;
			z-index: 2;
		}

		h2, p {
			color: #ffffff;
		}

		input {
			width: 90%;
			padding: 12px;
			border: none;
			border-bottom: 2px solid rgb(255, 255, 255);
			background: transparent;
			color: rgb(255, 255, 255);
			outline: none;
		}

		#customerEmail::placeholder {
			color: white;
			opacity: 1; 
		}

		button {
			background-color: black;
			color: white;
			border: none;
			padding: 14px 40px;
			border-radius: 10px;
			cursor: pointer;
			font-weight: bold;
			margin-top: 30px;
		}

		/* --- Mobile Responsive Fixes --- */
		/* --- Mobile Responsive Fixes --- */
		@media (max-width: 768px) {
			.background-grid {
			    /* Force exactly 3 equal columns on phones so there are no awkward gaps */
			    grid-template-columns: repeat(3, 1fr);
			    grid-auto-rows: 90px; /* Slightly smaller height for phones */
			    gap: 6px; 
			    padding: 6px;
			    opacity: 0.60; 
			}
			    
			/* Shrink the large pieces on mobile so they don't break the grid */
			.size-large { grid-column: span 2; grid-row: span 2; }
			.size-wide  { grid-column: span 2; grid-row: span 1; }
			.size-tall  { grid-column: span 1; grid-row: span 2; }
			.size-small { grid-column: span 1; grid-row: span 1; }
			    
			.card {
			    width: 90%; 
			    padding: 30px 20px;
				}
			}
	</style>
</head>

<body>

	<div class="background-grid">
		<img src="image1.jpg" class="grid-image size-large" alt="Historical Site">
		<img src="2.jpg" class="grid-image size-wide" alt="Historical Site">
		<img src="3.jpg" class="grid-image size-tall" alt="Historical Site">
		<img src="4.jpeg" class="grid-image size-small" alt="Historical Site">
		<img src="5.webp" class="grid-image size-wide" alt="Historical Site">
		<img src="6.webp" class="grid-image size-tall" alt="Historical Site">
		<img src="7.webp" class="grid-image size-small" alt="Historical Site">
		<img src="8.png" class="grid-image size-large" alt="Historical Site">
    	<img src="10.jpg" class="grid-image size-tall" alt="Historical Site">
    	<img src="12.jpg" class="grid-image size-large" alt="Historical Site">
    	<img src="15.jpg" class="grid-image size-large" alt="Historical Site">
		<img src="16.jpg" class="grid-image size-large" alt="Historical Site">
		<img src="18.jpg" class="grid-image size-small" alt="Historical Site">

		
	</div>

	<div class="card">
		<h2>Welcome to VMS</h2>
		<p style="color: white;">Please enter your email below.</p>

		<form id="emailForm">
			<input type="hidden" id="qrSource" value="1" />
			
			<input type="email" id="customerEmail" placeholder="Enter email" required />
			<br />
			<button type="submit">Submit</button>
		</form>

		<div id="message"></div>
	</div>

	<script>
		const SUPABASE_URL = "https://hwhqwjivazdozojhkeli.supabase.co";
		const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3aHF3aml2YXpkb3pvamhrZWxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NTgwNjcsImV4cCI6MjA5NzMzNDA2N30.5qgsM9KZ2Ff7EiYWab9yCXfhmibRZOwh4UXM0UiU92Q";

		const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

		document.getElementById('emailForm').addEventListener('submit', async (e) => {
			e.preventDefault(); 
			
			const emailInput = document.getElementById('customerEmail');
			const messageDiv = document.getElementById('message');
			const submitButton = e.target.querySelector('button');
			
			const email = emailInput.value;
			const source = document.getElementById('qrSource').value;

			messageDiv.style.marginTop = '15px';
			messageDiv.style.color = 'white'; 
			messageDiv.innerText = 'Sending...';
			submitButton.disabled = true; 

			try {
				const { error: dbError } = await supabaseClient
					.from('visitors_emails')
					.insert([
						{ 
							email: email, 
							site: parseInt(source)
						}
					]);

				if (dbError) {
					console.error("Database Error:", dbError);
					throw new Error("Failed to save to database. Check your table permissions.");
				}

				const response = await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
					},
					body: JSON.stringify({ email: email, source: source })
				});

				const result = await response.json();
				
				if (response.ok) {
					messageDiv.style.color = '#4CAF50'; 
					messageDiv.innerText = 'Email sent successfully!';
					emailInput.value = ''; 
				} else {
					messageDiv.style.color = '#ff6b6b'; 
					messageDiv.innerText = 'Error: ' + (result.error || 'Failed to send.');
				}
			} catch (err) {
				console.error(err);
				messageDiv.style.color = '#ff6b6b';
				messageDiv.innerText = err.message || 'An error occurred connecting to the server.';
			} finally {
				submitButton.disabled = false;
			}
		});
	</script>
</body>
</html>
